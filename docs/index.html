<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>📄 DREYKO Paper Trading</title>
<style>
:root{--bg:#0b0e13;--panel:#12161e;--line:#2c3442;--text:#e6edf3;--dim:#8b949e;
--green:#26a269;--red:#e0444b;--blue:#4fa8e0;--gold:#e8c34a}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,Segoe UI,sans-serif;font-size:14px;padding:14px}
h1{font-size:18px;margin:0 0 4px}
.sub{color:var(--dim);font-size:12px;margin-bottom:14px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:14px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px 12px}
.card .k{font-size:11px;color:var(--dim)}
.card .v{font-size:17px;font-weight:bold;margin-top:3px}
.g{color:#5fd99a}.r{color:#f08a8a}.b{color:#79c0ff}.y{color:var(--gold)}
canvas{width:100%;height:120px;background:var(--panel);border:1px solid var(--line);border-radius:8px;margin-bottom:14px}
h2{font-size:14px;margin:16px 0 8px;color:#c9d1d9}
table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:8px;overflow:hidden;font-size:12px}
th,td{padding:6px 8px;text-align:right;border-bottom:1px solid var(--line);white-space:nowrap}
th{background:#161b24;color:var(--dim);font-size:10px;text-transform:uppercase}
td:first-child,th:first-child{text-align:left}
.tag{font-size:9px;font-weight:bold;padding:1px 6px;border-radius:4px}
.tag.L{background:rgba(38,162,105,.2);color:#5fd99a}
.tag.S{background:rgba(224,68,75,.2);color:#f08a8a}
.tag.tp{background:rgba(38,162,105,.25);color:#5fd99a}
.tag.sl{background:rgba(224,68,75,.25);color:#f08a8a}
.tag.be{background:rgba(232,195,74,.2);color:var(--gold)}
.empty{color:var(--dim);padding:14px;text-align:center}
.wrap{overflow-x:auto}
details{margin-top:2px}
summary{cursor:pointer;color:var(--dim);font-size:11px}
.rsn{font-size:11px;color:#9aa4b2;margin:4px 0 0 12px;line-height:1.5}
.foot{color:var(--dim);font-size:11px;margin-top:14px;text-align:center}
</style>
</head>
<body>
<h1>📄 DREYKO × yigit × SolCJ × JB — Paper Trading</h1>
<div class="sub" id="sub">yükleniyor…</div>
<div class="cards" id="cards"></div>
<canvas id="eq" height="120"></canvas>
<h2>📌 Açık Pozisyonlar</h2>
<div class="wrap"><div id="open"></div></div>
<h2>✅ Kapanan İşlemler (son 50)</h2>
<div class="wrap"><div id="closed"></div></div>
<div class="foot">MEXC perp verisi · 60m sinyal + 15m LTF onayı · güven ≥%75 · market giriş (kayma %0.05 + taker %0.02) · TP1'de %50 derisk + SL→BE · risk %1 · SANAL işlemdir, yatırım tavsiyesi değildir.</div>
<script>
const fmt=(v,d)=>v==null?'-':(+v).toLocaleString('en-US',{maximumFractionDigits:d==null?6:d});
const ago=t=>{if(!t)return'-';const m=(Date.now()-t)/60000;return m<60?Math.round(m)+'dk':m<1440?(m/60).toFixed(1)+'sa':(m/1440).toFixed(1)+'g'};
async function load(){
  let st=null;
  for(const u of ['paper_state.json','../paper_state.json']){
    try{const r=await fetch(u+'?t='+Date.now());if(r.ok){st=await r.json();break;}}catch(e){}
  }
  if(!st){document.getElementById('sub').textContent='paper_state.json bulunamadı — ilk koşum bekleniyor (Actions).';return;}
  const s=st.stats||{};
  document.getElementById('sub').textContent='Son koşum: '+(st.lastRun?new Date(st.lastRun).toLocaleString('tr-TR'):'-')+' ('+ago(st.lastRun)+' önce) · koşum #'+(st.runs||0)+' · kaynak: '+(s.source||'-')+' · TF '+(s.tf||'60m')+' · eşik %'+(s.minConf||75);
  const eqPnl=st.equity-st.startEquity;
  document.getElementById('cards').innerHTML=[
    ['Özkaynak',fmt(st.equity,2)+' $',eqPnl>=0?'g':'r'],
    ['Net PnL',(eqPnl>=0?'+':'')+fmt(eqPnl,2)+' $',eqPnl>=0?'g':'r'],
    ['Toplam R',(s.totalR>0?'+':'')+fmt(s.totalR,2)+'R',s.totalR>=0?'g':'r'],
    ['Win Rate',s.winRate!=null?'%'+s.winRate:'-','b'],
    ['Kapanan',fmt(s.closed,0)+' (W'+fmt(s.wins,0)+'/L'+fmt(s.losses,0)+')','b'],
    ['Açık',st.open.length,'y']
  ].map(c=>'<div class="card"><div class="k">'+c[0]+'</div><div class="v '+c[2]+'">'+c[1]+'</div></div>').join('');
  drawEq(st.equityHistory||[]);
  const O=document.getElementById('open');
  if(!st.open.length) O.innerHTML='<div class="empty">Açık pozisyon yok — motor sinyal bekliyor.</div>';
  else O.innerHTML='<table><tr><th>Parite</th><th>Yön</th><th>Giriş</th><th>SL</th><th>TP1</th><th>TP-F</th><th>Miktar</th><th>Risk$</th><th>Güven</th><th>Not</th><th>MMxM</th><th>Derisk</th><th>Yaş</th></tr>'+
    st.open.map(t=>'<tr><td>'+t.symbol.replace('_','/')+'<details><summary>gerekçe</summary><div class="rsn">'+(t.reasons||[]).join('<br>')+'</div></details></td>'+
    '<td><span class="tag '+(t.side==='LONG'?'L':'S')+'">'+t.side+'</span></td><td>'+fmt(t.entry)+'</td><td class="r">'+fmt(t.sl)+'</td><td class="g">'+fmt(t.tp1)+'</td><td class="g">'+fmt(t.tpF)+'</td>'+
    '<td>'+fmt(t.qty,4)+'</td><td>'+fmt(t.riskUSD,0)+'</td><td>%'+t.conf+'</td><td>'+t.grade+'</td><td>'+(t.mmxm?(t.mmxm.score+'/'+t.mmxm.max+(t.mmxm.valid?' ✓':'')):'-')+'</td>'+
    '<td>'+(t.deriskDone?'✓ BE':'-')+'</td><td>'+ago(t.openedAt)+'</td></tr>').join('')+'</table>';
  const C=document.getElementById('closed');
  const cl=(st.closed||[]).slice(0,50);
  if(!cl.length) C.innerHTML='<div class="empty">Henüz kapanan işlem yok.</div>';
  else C.innerHTML='<table><tr><th>Parite</th><th>Yön</th><th>Sonuç</th><th>Giriş</th><th>Çıkışlar</th><th>PnL $</th><th>R</th><th>Güven</th><th>Süre</th><th>Kapanış</th></tr>'+
    cl.map(t=>{const cls=t.closeReason==='TP'?'tp':t.closeReason==='BE'?'be':'sl';
    return '<tr><td>'+t.symbol.replace('_','/')+'</td><td><span class="tag '+(t.side==='LONG'?'L':'S')+'">'+t.side+'</span></td>'+
    '<td><span class="tag '+cls+'">'+t.closeReason+'</span></td><td>'+fmt(t.entry)+'</td>'+
    '<td>'+(t.fills||[]).map(f=>f.why+'@'+fmt(f.px)).join(' · ')+'</td>'+
    '<td class="'+(t.realized>=0?'g':'r')+'">'+(t.realized>=0?'+':'')+fmt(t.realized,2)+'</td>'+
    '<td class="'+(t.r>=0?'g':'r')+'">'+(t.r>=0?'+':'')+fmt(t.r,2)+'</td><td>%'+t.conf+'</td>'+
    '<td>'+((t.closedAt-t.openedAt)/3600000).toFixed(1)+'sa</td><td>'+new Date(t.closedAt).toLocaleString('tr-TR')+'</td></tr>';}).join('')+'</table>';
}
function drawEq(h){
  const cv=document.getElementById('eq'),ctx=cv.getContext('2d');
  cv.width=cv.clientWidth*(devicePixelRatio||1);cv.height=120*(devicePixelRatio||1);
  ctx.scale(devicePixelRatio||1,devicePixelRatio||1);
  const W=cv.clientWidth,H=120;ctx.clearRect(0,0,W,H);
  if(h.length<2){ctx.fillStyle='#8b949e';ctx.font='11px Arial';ctx.fillText('özkaynak eğrisi için veri birikiyor…',10,60);return;}
  const eqs=h.map(x=>x.eq),mn=Math.min(...eqs),mx=Math.max(...eqs),sp=(mx-mn)||1;
  ctx.strokeStyle='#4fa8e0';ctx.lineWidth=1.6;ctx.beginPath();
  h.forEach((x,i)=>{const px=8+(W-16)*i/(h.length-1),py=H-14-(H-28)*(x.eq-mn)/sp;i?ctx.lineTo(px,py):ctx.moveTo(px,py);});
  ctx.stroke();
  ctx.fillStyle='#8b949e';ctx.font='10px Arial';
  ctx.fillText(fmt(mx,0),8,12);ctx.fillText(fmt(mn,0),8,H-4);
}
load();setInterval(load,60000);
</script>
</body>
</html>
